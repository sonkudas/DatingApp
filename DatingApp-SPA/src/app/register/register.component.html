
<form #registerForm="ngForm" (ngSubmit)="register()" >
  <h2 class="text-center text-primary">Sign up </h2>
  <hr>
  <div class="form-group">
  <input type="text" class="form-control" name="username" required [(ngModel)]="model.username" placeholder="Username">
  </div>
  <div class="form-group">
   <label for="favourateValue">Whis ia your favourate value></label>
   <select class="form-control" id="favourateValue">
     <option *ngFor="let value of valuesFromHome" [value]="value">{{value.name}}</option>
   </select>
    </div>
  <div class="form-group">
  <input type="password" class="form-control" name="password" [(ngModel)]="model.password" required  placeholder="Password">
  </div>
  <div class="form-group text-center">
  <button class="btn btn-success" type="submit">Regsiter</button>
  <button class="btn btn-default" (click)="cancel()" type="button">Cancel</button>
  </div>
  </form>
